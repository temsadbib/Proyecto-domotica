# Stack tiempo real (TimescaleDB 5433, Grafana 3001). El estático es solo docker-compose.yml.

services:
  timescaledb_live:
    image: timescale/timescaledb:latest-pg15
    container_name: timescaledb_live
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Qwe1234.
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./init-scripts:/docker-entrypoint-initdb.d/
      - timescaledb-live-data:/var/lib/postgresql/data
    networks:
      - live-network

  grafana_live:
    image: grafana/grafana:latest
    container_name: grafana_live
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-live-storage:/var/lib/grafana
      - ./grafana-live/provisioning:/etc/grafana/provisioning
      - ../dashboard:/var/lib/grafana/dashboards:ro
    networks:
      - live-network
    depends_on:
      - timescaledb_live

  simulate-ltss:
    profiles:
      - simulate
    image: python:3.12-slim
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../scripts_tiempo_real:/app/scripts_tiempo_real
    command: >
      bash -c "pip install -q --disable-pip-version-check psycopg2-binary
      && python scripts_tiempo_real/datos_simulados.py --host timescaledb_live --port 5432"
    environment:
      PGUSER: postgres
      PGPASSWORD: Qwe1234.
      PGDATABASE: postgres
    networks:
      - live-network
    depends_on:
      - timescaledb_live

  predict-derroche:
    profiles:
      - simulate
    image: python:3.12-slim
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../scripts_tiempo_real:/app/scripts_tiempo_real
      - ../app:/app/app
      - ../models:/app/models
    command: >
      bash -c "pip install -q --disable-pip-version-check psycopg2-binary joblib numpy scikit-learn pandas
      && pip install -q --disable-pip-version-check torch --index-url https://download.pytorch.org/whl/cpu
      && python scripts_tiempo_real/predict_derroche.py --host timescaledb_live --port 5432 --interval 60"
    environment:
      PGUSER: postgres
      PGPASSWORD: Qwe1234.
      PGDATABASE: postgres
    networks:
      - live-network
    depends_on:
      - timescaledb_live

networks:
  live-network:
    driver: bridge

volumes:
  timescaledb-live-data:
  grafana-live-storage:
